<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      data-namespace-typo3-fluid="true">

<li>
    <f:comment><span class="tx-dlf-tools-imagedownload"></f:comment>
        <f:if condition="{double} === 0">
            <f:then>
                <f:link.external uri="{imageDownload.0.url}" class="tx-dlf-tools-imagedownload">
                    <f:translate key="downloadSinglePage" /> {imageDownload.0.mimetypeLabel}
                </f:link.external>
            </f:then>
            <f:else>
                <f:link.external uri="{imageDownload.0.url}" class="tx-dlf-tools-imagedownload">
                    <f:translate key="downloadLeftPage" /> {imageDownload.0.mimetypeLabel}
                </f:link.external>
                <f:if condition="{imageDownload.1}">
                    <f:comment><span class="tx-dlf-tools-imagedownload"></f:comment>
                        <f:link.external uri="{imageDownload.1.url}" class="tx-dlf-tools-imagedownload">
                            <f:translate key="downloadRightPage" /> {imageDownload.1.mimetypeLabel}
                        </f:link.external>
                    <f:comment></span></f:comment>
                </f:if>
            </f:else>
        </f:if>
    <f:comment></span></f:comment>
</li>

</html>
